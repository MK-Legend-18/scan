<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Verification</title>

<style>
body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#000,#111,#330000);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.box{
background:#111;
padding:30px;
border-radius:15px;
width:340px;
text-align:center;
box-shadow:0 0 25px rgba(255,0,0,.4);
}

h1{
color:#ff2a2a;
margin-bottom:20px;
}

p{
color:#bbb;
font-size:14px;
margin-bottom:15px;
}

input{
width:92%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:15px;
}

button{
width:95%;
padding:12px;
border:none;
border-radius:8px;
background:red;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#cc0000;
}
</style>
</head>

<body>

<div class="box">
<h1>Student Verification</h1>
<p>Please enter details to continue</p>

<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="branch" placeholder="Enter Branch">

<button onclick="submitData()">Verify & Continue</button>
</div>

<script>
function submitData(){

let name=document.getElementById("name").value.trim();
let branch=document.getElementById("branch").value.trim();

if(name==="" || branch===""){
alert("Please fill all fields");
return;
}

fetch("https://script.google.com/macros/s/AKfycbzyYqOdxtOiRv7X9xObheAIZjshXfNb_jg0ZrlOaoXMh5gkIiCzRVhTv4CnpFMBoYMB/exec",{
method:"POST",
body:new URLSearchParams({
name:name,
branch:branch
})
})
.then(response => response.text())
.then(data => {
window.location.href="https://i.postimg.cc/t4SPKXS5/Picsart-26-04-21-14-31-22-748.jpg";
})
.catch(error => {
alert("Error submitting form");
});

}
</script>

</body>
</html>
